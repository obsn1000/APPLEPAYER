<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Apple Pay Demo</title>
  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      padding: 50px;
    }
    #pay-button {
      font-size: 18px;
      padding: 15px 30px;
      background-color: black;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>Pay with Apple Pay</h1>
  <button id="pay-button">💳 Pay with Apple Pay</button>

  <script>
    document.getElementById('pay-button').addEventListener('click', () => {
      if (window.ApplePaySession && ApplePaySession.canMakePayments()) {
        const request = {
          countryCode: 'US',
          currencyCode: 'USD',
          supportedNetworks: ['visa', 'masterCard'],
          merchantCapabilities: ['supports3DS'],
          total: {
            label: 'APPLEPAYER',
            amount: '10.00'
          }
        };

        const session = new ApplePaySession(3, request);

        session.onvalidatemerchant = async (event) => {
          const response = await fetch('/api/validate-merchant', {
            method: 'POST',
            body: JSON.stringify({ validationURL: event.validationURL })
          });
          const merchantSession = await response.json();
          session.completeMerchantValidation(merchantSession);
        };

        session.onpaymentauthorized = (event) => {
          fetch('/api/process-payment', {
  method: 'POST',
  headers: { 'Content-Type': 'application/json' },
  body: JSON.stringify({ token: event.payment.token })
})
.then(res => res.json())
.then(data => console.log('✅ Server response:', data))
.catch(err => console.error('❌ Payment error:', err));

          session.completePayment(ApplePaySession.STATUS_SUCCESS);
        };

        session.begin();
      } else {
        alert("❌ Apple Pay not available");
      }
    });
  </script>
</body>
</html>
